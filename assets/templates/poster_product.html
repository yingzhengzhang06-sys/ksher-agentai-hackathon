<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
</style>
</head>
<body>
<div style="width:750px;height:1334px;background:linear-gradient(180deg,#E83E4C 0%,#FF6B5B 40%,#FFB884 100%);position:relative;overflow:hidden;">

  <!-- 装饰元素 -->
  <div style="position:absolute;top:-60px;right:-60px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,0.06);"></div>
  <div style="position:absolute;top:200px;left:-40px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.04);"></div>

  <!-- 品牌头部 -->
  <div style="padding:50px 50px 20px;display:flex;align-items:center;">
    <div style="width:48px;height:48px;background:white;border-radius:12px;display:flex;align-items:center;justify-content:center;">
      <span style="color:#E83E4C;font-size:22px;font-weight:800;">K</span>
    </div>
    <div style="margin-left:14px;">
      <span style="color:white;font-size:22px;font-weight:700;">Ksher · 开时支付</span>
    </div>
  </div>

  <!-- 主标题 -->
  <div style="padding:30px 50px 10px;">
    <div style="color:white;font-size:48px;font-weight:800;line-height:1.3;text-shadow:0 2px 8px rgba(0,0,0,0.15);">{title}</div>
    <div style="color:rgba(255,255,255,0.85);font-size:20px;margin-top:12px;font-weight:400;">{subtitle}</div>
  </div>

  <!-- 卖点卡片区 -->
  <div style="padding:30px 40px;display:flex;flex-direction:column;gap:14px;" id="points-area">
    {points_html}
  </div>

  <!-- CTA 按钮 -->
  <div style="position:absolute;bottom:120px;left:50px;right:50px;">
    <div style="background:white;color:#E83E4C;font-size:24px;font-weight:700;text-align:center;padding:20px;border-radius:60px;box-shadow:0 6px 24px rgba(0,0,0,0.15);">{cta}</div>
  </div>

  <!-- 底部信息 -->
  <div style="position:absolute;bottom:40px;left:50px;right:50px;display:flex;justify-content:space-between;align-items:center;">
    <div>
      <div style="color:rgba(255,255,255,0.9);font-size:14px;">东南亚跨境收款专家 · 8国本地牌照</div>
      <div style="color:rgba(255,255,255,0.6);font-size:12px;margin-top:4px;">红杉/戈壁投资 · 10,000+企业客户</div>
    </div>
    <div style="width:64px;height:64px;background:white;border-radius:10px;display:flex;align-items:center;justify-content:center;">
      <span style="font-size:9px;color:#999;text-align:center;">扫码咨询</span>
    </div>
  </div>
</div>
</body>
</html>
