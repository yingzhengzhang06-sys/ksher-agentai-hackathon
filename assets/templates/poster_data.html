<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
</style>
</head>
<body>
<div style="width:750px;height:1334px;background:linear-gradient(180deg,#f8f9fa 0%,#ffffff 100%);position:relative;overflow:hidden;">

  <!-- 顶部红色条 -->
  <div style="height:6px;background:linear-gradient(90deg,#E83E4C,#FF6B5B,#FFB884);"></div>

  <!-- 品牌头部 -->
  <div style="padding:40px 50px 20px;display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;">
      <div style="width:40px;height:40px;background:#E83E4C;border-radius:10px;display:flex;align-items:center;justify-content:center;">
        <span style="color:white;font-size:18px;font-weight:800;">K</span>
      </div>
      <span style="color:#333;font-size:16px;font-weight:600;margin-left:10px;">Ksher · 数据洞察</span>
    </div>
    <span style="color:#999;font-size:13px;">{data_source}</span>
  </div>

  <!-- 大标题数字 -->
  <div style="padding:20px 50px 0;text-align:center;">
    <div style="color:#E83E4C;font-size:72px;font-weight:800;line-height:1;">{headline_number}</div>
    <div style="color:#333;font-size:24px;font-weight:600;margin-top:10px;">{headline_text}</div>
    <div style="color:#999;font-size:15px;margin-top:8px;">{headline_sub}</div>
  </div>

  <!-- 对比表格 -->
  <div style="margin:30px 40px;background:white;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;border:1px solid #eee;">
    <!-- 表头 -->
    <div style="display:flex;background:#f8f9fa;border-bottom:2px solid #eee;">
      <div style="flex:1.2;padding:14px 16px;font-size:14px;color:#999;font-weight:500;">对比项</div>
      <div style="flex:1;padding:14px 16px;font-size:14px;color:#E83E4C;font-weight:700;text-align:center;">Ksher</div>
      <div style="flex:1;padding:14px 16px;font-size:14px;color:#666;font-weight:500;text-align:center;">{compare_name}</div>
    </div>
    {table_rows_html}
  </div>

  <!-- 关键指标圆圈 -->
  <div style="padding:20px 50px;display:flex;justify-content:space-around;">
    {metrics_html}
  </div>

  <!-- 结论 -->
  <div style="margin:20px 40px;background:linear-gradient(135deg,#FFF5F5,#FFF0F0);border-radius:12px;padding:20px 24px;border-left:4px solid #E83E4C;">
    <div style="color:#E83E4C;font-size:15px;font-weight:600;">{conclusion}</div>
  </div>

  <!-- CTA -->
  <div style="position:absolute;bottom:100px;left:50px;right:50px;">
    <div style="background:#E83E4C;color:white;font-size:20px;font-weight:700;text-align:center;padding:18px;border-radius:60px;">{cta}</div>
  </div>

  <!-- 底部 -->
  <div style="position:absolute;bottom:40px;left:50px;right:50px;display:flex;justify-content:space-between;align-items:center;">
    <div style="color:#999;font-size:12px;">东南亚跨境收款专家 · 8国本地牌照</div>
    <div style="width:54px;height:54px;background:#f5f5f5;border-radius:8px;display:flex;align-items:center;justify-content:center;">
      <span style="font-size:8px;color:#999;">扫码咨询</span>
    </div>
  </div>
</div>
</body>
</html>
