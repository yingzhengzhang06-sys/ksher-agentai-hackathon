<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
</style>
</head>
<body>
<div style="width:375px;height:667px;background:linear-gradient(180deg,#E83E4C 0%,#FF6B76 40%,#FF8A94 100%);position:relative;overflow:hidden;">

  <!-- 顶部装饰圆 -->
  <div style="position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.06);"></div>
  <div style="position:absolute;top:80px;left:-40px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.04);"></div>

  <!-- 顶部品牌栏 -->
  <div style="padding:24px 24px 12px;display:flex;align-items:center;position:relative;z-index:2;">
    <div style="width:36px;height:36px;background:white;border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.15);">
      <span style="color:#E83E4C;font-size:16px;font-weight:800;">K</span>
    </div>
    <div style="margin-left:10px;">
      <span style="color:white;font-size:17px;font-weight:700;letter-spacing:0.5px;">Ksher</span>
      <span style="color:rgba(255,255,255,0.75);font-size:12px;margin-left:6px;">开时支付</span>
    </div>
  </div>

  <!-- 主标题区 -->
  <div style="padding:0 24px 16px;position:relative;z-index:2;">
    <div style="color:rgba(255,255,255,0.9);font-size:13px;font-weight:500;letter-spacing:1px;">出海无难事</div>
    <div style="color:white;font-size:22px;font-weight:800;margin-top:2px;letter-spacing:1px;">现在就开时</div>
  </div>

  <!-- 内容卡片 -->
  <div style="margin:0 18px;background:white;border-radius:18px;padding:22px 20px;min-height:360px;box-shadow:0 12px 40px rgba(0,0,0,0.15);position:relative;z-index:2;">
    <div style="font-size:14px;color:#1d2129;line-height:1.85;white-space:pre-wrap;word-break:break-word;">{content}</div>

    <!-- 关键词标签 -->
    <div style="margin-top:18px;padding-top:14px;border-top:1px solid #f0f0f0;">
      <div style="display:flex;flex-wrap:wrap;gap:6px;">{keywords}</div>
    </div>
  </div>

  <!-- 底部品牌信息栏 -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:90px;background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,0.25) 100%);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:relative;z-index:2;">
    <div>
      <div style="color:white;font-size:14px;font-weight:700;">{brand_name}</div>
      <div style="color:rgba(255,255,255,0.7);font-size:11px;margin-top:3px;">{slogan}</div>
    </div>
    <!-- 二维码占位 -->
    <div style="width:56px;height:56px;background:white;border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.15);">
      <div style="width:44px;height:44px;background:repeating-linear-gradient(0deg, #333 0px, #333 2px, transparent 2px, transparent 4px), repeating-linear-gradient(90deg, #333 0px, #333 2px, transparent 2px, transparent 4px);border-radius:4px;opacity:0.7;"></div>
    </div>
  </div>

  <!-- 底部装饰线 -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#E83E4C,#FF6B76,#FFD700,#E83E4C);z-index:3;"></div>
</div>
</body>
</html>
