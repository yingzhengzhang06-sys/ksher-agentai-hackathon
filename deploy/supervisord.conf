[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisord

# Streamlit 应用进程
[program:streamlit]
command=/usr/local/bin/python -m streamlit run app.py --server.port=8501 --server.address=0.0.0.0
directory=/app
user=ksher_user
autostart=true
autorestart=true
startsecs=10
stopwaitsecs=600
stdout_logfile=/var/log/supervisord/streamlit_stdout.log
stderr_logfile=/var/log/supervisord/streamlit_stderr.log
environment=PYTHONUNBUFFERED="1"

# Celery Worker 进程
[program:celery-worker]
command=/usr/local/bin/python -m celery -A tasks worker -l info --loglevel=info --concurrency=4
directory=/app
user=ksher_user
autostart=true
autorestart=true
startsecs=10
stopwaitsecs=600
stdout_logfile=/var/log/supervisord/celery_worker_stdout.log
stderr_logfile=/var/log/supervisord/celery_worker_stderr.log
environment=PYTHONUNBUFFERED="1"
priority=100

# Celery Beat 进程（定时任务）
[program:celery-beat]
command=/usr/local/bin/python -m celery -A tasks beat -l info --loglevel=info --scheduler-filename=/app/data/celerybeat-schedule
directory=/app
user=ksher_user
autostart=true
autorestart=true
startsecs=10
stopwaitsecs=600
stdout_logfile=/var/log/supervisord/celery_beat_stdout.log
stderr_logfile=/var/log/supervisord/celery_beat_stderr.log
environment=PYTHONUNBUFFERED="1"
priority=90

# 日志轮转
[program:logrotate]
command=/usr/sbin/logrotate /var/log/supervisord/*.log
user=root
autostart=true
autorestart=true
startsecs=0
priority=200

# 监控所有进程
[group:app]
programs=streamlit

[group:worker]
programs=celery-worker,celery-beat
