<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
</style>
</head>
<body>
<div style="width:540px;height:960px;background:linear-gradient(180deg,#E83E4C 0%,#FF4757 30%,#FF6B81 100%);position:relative;overflow:hidden;">

  <!-- 装饰圆 -->
  <div style="position:absolute;top:-80px;right:-80px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,0.08);"></div>
  <div style="position:absolute;bottom:200px;left:-60px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.05);"></div>

  <!-- 顶部品牌 -->
  <div style="padding:60px 40px 0;display:flex;align-items:center;">
    <div style="width:44px;height:44px;background:white;border-radius:12px;display:flex;align-items:center;justify-content:center;">
      <span style="color:#E83E4C;font-size:22px;font-weight:800;">K</span>
    </div>
    <span style="color:rgba(255,255,255,0.9);font-size:16px;margin-left:12px;font-weight:500;">Ksher · 跨境收款</span>
  </div>

  <!-- 主标题区域 -->
  <div style="padding:80px 40px 0;">
    <div style="color:white;font-size:48px;font-weight:800;line-height:1.3;text-shadow:0 2px 8px rgba(0,0,0,0.15);">{title}</div>
  </div>

  <!-- 副标题/钩子 -->
  <div style="padding:24px 40px 0;">
    <div style="color:rgba(255,255,255,0.85);font-size:22px;line-height:1.5;">{subtitle}</div>
  </div>

  <!-- 核心数据点 -->
  <div style="position:absolute;bottom:200px;left:40px;right:40px;">
    <div style="display:flex;justify-content:space-around;">
      <div style="text-align:center;">
        <div style="color:white;font-size:36px;font-weight:800;">8国</div>
        <div style="color:rgba(255,255,255,0.7);font-size:14px;margin-top:4px;">本地牌照</div>
      </div>
      <div style="text-align:center;">
        <div style="color:white;font-size:36px;font-weight:800;">T+1</div>
        <div style="color:rgba(255,255,255,0.7);font-size:14px;margin-top:4px;">快速到账</div>
      </div>
      <div style="text-align:center;">
        <div style="color:white;font-size:36px;font-weight:800;">0.05%</div>
        <div style="color:rgba(255,255,255,0.7);font-size:14px;margin-top:4px;">费率起</div>
      </div>
    </div>
  </div>

  <!-- 底部提示 -->
  <div style="position:absolute;bottom:60px;left:40px;right:40px;text-align:center;">
    <div style="color:rgba(255,255,255,0.6);font-size:14px;">点击观看完整视频 👆</div>
  </div>
</div>
</body>
</html>
