<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
</style>
</head>
<body>
<div style="width:540px;height:960px;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);position:relative;overflow:hidden;">

  <!-- 装饰元素 -->
  <div style="position:absolute;top:80px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(232,62,76,0.12);filter:blur(40px);"></div>
  <div style="position:absolute;bottom:280px;left:-50px;width:160px;height:160px;border-radius:50%;background:rgba(255,180,132,0.08);filter:blur(30px);"></div>

  <!-- 顶部品牌 -->
  <div style="padding:60px 40px 0;display:flex;align-items:center;">
    <div style="width:44px;height:44px;background:#E83E4C;border-radius:12px;display:flex;align-items:center;justify-content:center;">
      <span style="color:white;font-size:22px;font-weight:800;">K</span>
    </div>
    <span style="color:rgba(255,255,255,0.8);font-size:16px;margin-left:12px;">Ksher · 跨境收款专家</span>
  </div>

  <!-- 标签 -->
  <div style="padding:40px 40px 0;">
    <span style="background:rgba(232,62,76,0.9);color:white;font-size:14px;padding:6px 16px;border-radius:20px;font-weight:500;">{tag}</span>
  </div>

  <!-- 主标题 -->
  <div style="padding:24px 40px 0;">
    <div style="color:white;font-size:44px;font-weight:800;line-height:1.3;">{title}</div>
  </div>

  <!-- 副标题 -->
  <div style="padding:20px 40px 0;">
    <div style="color:rgba(255,255,255,0.7);font-size:20px;line-height:1.5;">{subtitle}</div>
  </div>

  <!-- 要点卡片 -->
  <div style="margin:40px 30px;background:rgba(255,255,255,0.06);border-radius:16px;padding:24px;border:1px solid rgba(255,255,255,0.1);">
    <div style="color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:12px;">本期要点</div>
    <div style="color:white;font-size:17px;line-height:2;">{points}</div>
  </div>

  <!-- 底部 -->
  <div style="position:absolute;bottom:60px;left:40px;right:40px;display:flex;justify-content:space-between;align-items:center;">
    <div style="color:rgba(255,255,255,0.5);font-size:13px;">东南亚跨境收款专家 · 8国本地牌照</div>
    <div style="width:50px;height:50px;background:rgba(255,255,255,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;">
      <span style="font-size:8px;color:rgba(255,255,255,0.5);">扫码</span>
    </div>
  </div>
</div>
</body>
</html>
